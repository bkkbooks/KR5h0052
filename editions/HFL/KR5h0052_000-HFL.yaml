亦高何須分訴口叨叨前頭自有高人力不枉工夫走一遭行人舊約雖違莫怨嗟行人已自離天涯如今不必倚門望巳午逢羊便到家占病小病纏身莫謾看恐加潮熱變脾寒如今正是灾星照不肯脩禳難保安解曰占家宅人口昌隆失物得見占病作福不防求財大遂官事有理行人立至婚姻可成六甲生男田蠶大熟六畜興旺君子加官進職玄天上帝感應靈籤第三十九籤下下入山迷路聖意忽入深山去路迷不如歸去决狐疑進退出行俱不利切須防愼暗中欺謀望走遍天涯事未成纔成又着一場驚不如守舊隨緣過春到人間枯木榮家宅畜産衰嬴人眷尪無端怪夢亂昏黃汝今且待秋成後好把門庭向日更婚姻昨種芝蘭豈便芳誰知嫩草不經霜日今若得成婚眷入舍還憂不久長失物汝憂失去問知風只是難尋未落空退步寬心終得見不然惹起鬧轟轟官事有理番成失理虧吁嗟好事到頭非托人勸解方爲吉免得牽連到獄闈行人若問行人尚未還忙忙回首已郷關行非恩戀歸來晩只爲絲絲事掛攀占病悮求藥餌罔求神疾病懨懨朱脫身斗下有功灾可度便教乆病頓然輕解曰占家宅防失脫自身防口舌隂人小口有灾失物不見占病保福求財夫遂行人未至官事不利求官未達婚姻難成六甲生女虛驚田蠶半收六畜損失玄天上帝感應靈籤第四十籤大吉鴻鵠摩天聖意鴻鵠摩天勢自然未逢時至致災此日升騰還自在翺翔直上九重天謀望時逢暖律景和平謀望求財緫遂心若要營爲當此際管教奮發取功名家宅無移無定怪無凶莫把閑愁掛腹中自有福神隂力佑秋冬財喜兩三重婚姻前生原是汝家人今世相逢又做親爭奈目今時未至且宜寬慢待人成失物失去資財却自忙只因不肯細隄防如今失却無回路終有傍人說信方官事吾今報汝不須憂官事雖凶未到頭但得貴人問口笑不教賢者寫供由行人幾度陽關去問津未知音信寄何人如今不必登樓望久客歸期在酉辰占病未遇良醫病不除家財消乏莫嗟吁但要五湖明月在不愁無䖏獲金珠解曰占家宅自身出入吉利失物難尋終久見病者服藥求財遂意行人立至官事有理求官必達六甲生男田蠶大熟六畜旺相婚姻成遲玄天上帝感應靈籤第四十一籤下下落花流水聖意落花流水兩無情家宅憂疑主不寍小口隂人招疾厄切須急禱告神明謀望當時有意逐東流欲徃蓬菜謁十州不肯回頭歸舊業却教埋没入荒坵家宅鬼怪無端遶户庭嚮聲怪夢使人驚要知因甚人財蹇只爲門前路不平婚姻休想斯人到汝家莫教執昧起咨嗟落花有意隨流水流水無情戀落花失物家人報汝有憂驚夢裏耽迷不自醒已失且宜底着忍休教冒認失人情官事暗室虧心天地知何須臨事告神祇有理未成宜退步恐遭刑憲悔來遲行人非是其人不戀家只因阻隔在天涯敬尋無路終朝望十二巫山鎖暮霞占病運蹇時乖不自由灾來只爲苦貪求月過十五光眀少人到終年萬事休解曰占家宅自身不利失物不見行人未至占病作福六甲生女有驚田蠶不收六畜損失凡事不利玄天上帝感應靈籤第四十二籤大吉遊魚戲水聖意遊魚戲水出波間跳躍優游豈等閑喜遇泰來通萬事更無險難向於前謀望地冷天寒水凍氷安心守志樂清貧如今喜遇陽和至四海遨遊任徃行家宅今年春夏事如何人口無憂畜産多秋末冬初歲小悔更宜祈福保平和婚姻天與姻縁兩利宜那堪相許莫相違他時共得成連理似水如魚豈暫離失物失去何須心下忙只因無事少隄防要知踪跡歸何䖏祗在溪邊水岸傍官事小人捚怪起無端良善荒荒心膽寒天理豈容人事變不教直者受欺瞞行人困旅窮途羈絆間去時容易轉時難伊今要問歸期日直待魚龍出淺灘占病天星不順被灾愆何用臨危告聖賢但要汝心存善念能教百病自然痊解曰占家宅人口平安自身出入吉利求財得遂行人欲至求官得位官事得理婚姻和合六甲生男田蠶大熟六畜興旺凡事大吉玄天上帝感應靈籤第四十三籤上吉日出扶桑聖意日出扶桑萬里明貴人喜氣自亨通求財謀望稱心意若問求官定有名謀望幾番辛苦起二更只爲平生利與名喜得太陽東海出光明無處不亨通家宅福星高照汝家門些小憂危不必論人口田蠶思欲穩神前多把好香焚婚姻如今喜得自投機正好成婚過禮儀兩下相求無别慮休題年長與年抵失物東西古路舊林前失去踪由在裏邊死物依然生活物不須怨悵把人寃官事是非無故陷平人何用憂心怯杖刑自有貴人來喝散終無囚獄不須驚行人故人久去在天涯萬水千山未到家今日鴈傳音信至平安報到免咨嗟占病平安無事不燒香直待臨危告上蒼汝病欲求痊可日除非捨去世間贓解曰占家宅人口平安自身有喜失物不失病者不妨求財大利行人有信官事有理求官得位婚姻可成六甲生男田蠶大熟六畜興旺玄天上帝感應靈籤第四十四籤中下烏雲遍月聖意烏雲遍月恰朦朧暗裏門庭事未中只宜守舊方爲吉直待雲開萬事通謀望本是聦明豁達人恰如明月被鳥雲等閑借得東風力吹散浮雲月再明家宅户冷門衰百怪生人離財散夢魂驚如今若問平安日除是脩心學道經婚姻本來婚婭要團圓爭奈傍人亂鬧喧早定不如遲定好寍教達者受孤眠失物莫將小事惡心中神怒人嫌難見踪且去南方尋舊跡如今不必亂搥胷官事休爭閑氣起官災到彼應無乾淨來孰若平和回首去不然牽絆入牢圍行人音書未許寄來頻豈料中途鴈失群等到鷄鳴犬吠日行人方脫萬重雲占病禍福無門自惹來七情深染便生災如今苦要心安樂廣布隂功捨施財解曰占家宅人口不安自身防小口失物不見占病宜作福求財未遂行人未至官事失理宜和求官未達婚姻難成六甲生女田蠶半收六畜損失玄天上帝感應靈籤第四十五籤中平風雷鼓舞聖意風雷鼓舞播乾坤萬物萌芽此日新君子求謀皆遂意庶人迪吉顯家門謀望秋後春前欲利名機關用盡專難成君能守得東風至蟄奮升騰枯木榮家宅勤脩香火福神歡瘟疾無侵邪不干春夏累逢唇吻事秋冬方喜進平安婚姻天婚本是宿時縁休聽傍人胡亂傳怠慢遷延三五日琵琶抱入别人船失物自從失去不知風問卜求神盡是空惟有本心隂德重如今踪跡在西東官事初然聲勢好驚人良善荒荒意不寍若得洞庭歸去後風和浪靜放船行行人傍人傳說不相同去後音書不見踪幸是本家隂隲重分明人在泰和中占病心煩骨熱更皮寒咒咀寃家起禍端早向神天求謝過能令百病自然安解曰占家宅人口平安自身無事失物可尋病者自痊求財遂意行人便至官事有理貴人扶持求官顯達六甲生男田蠶大熟婚姻忽成百事大吉玄天上帝感應靈籤第四十六籤下下騰蛇入夢聖意騰蛇入夢主憂疑防愼家門有賊欺將來革過方爲吉進退如今未遇時謀望心南意北枉清排悔氣如今尚未開名利欲求非此日寬心守舊待時來家宅六畜有時作怪聲無端惡夢又驚人要知因甚人多事只爲人求少福神婚姻眷屬無縁豈易逢也應說過兩三重縱然勉强成親後只恐相逢是夢中失物夢中曾報有驚疑不覺隄防引盜窺已失要尋難得見若經官府反招非官事人鬼交橫事未諧如今急急早安排見官不如私和好嬴得之時也損財行人坐想行思去路賒重山阻隔未還家如今要見親人面直待蟾光轉海涯占病苦病纏身不可當投醫無效好難量欲得不如南柯夢你是脩身作善良解曰占家宅不寍自身防口舌失物難尋病者保福六甲生女虛驚求財未遂官事失理求官未達婚姻不成行人未至田蠶半收六畜損失玄天上帝感應靈籤第四十七籤中平宻雲不雨聖意宻雲不雨尚濛蒼却主憂疑亦不妨更有小人來害己家門暗昧事須防謀望否泰相兼理自然莫憂運用乆淹連有時借得春風力吹散浮雲見碧天家宅門庭暗昧鬼邪多人眷驚憂怎奈何要得平安須祭祖將心更改念彌陀婚姻婚姻前定莫强爲縱若强爲久後非此䖏不留須别䖏何勞着意惹躭迷失物堪笑浮生空自忙不知天綱暗中張榮枯得失皆前定自古浮生不乆長官事官事悠悠不肯休叮嚀囑汝不須憂若逢龍虎交逢日不用干戈也自休行人遠望行人信息稀不知凶吉致狐疑如今若問眞消息蛇馬逢牛是到期占病偶然無事忽遭愆定是亡人要紙錢有願在心宜早賽莫教淹滯在床眠解曰占家宅人口有小災不寍自身防口舌占失物不行人未至病者作福求財未遂官事留連求官未達婚姻不成六甲生女田蠶半收玄天上帝感應靈籤第四十八籤大吉寳劒新磨聖意寳劒新磨益見光東西照耀倍尋常從前自有根基在潤色增明聲播揚謀望百煉千磨過此身幾年靜裡困埃塵如今借得良工力官貴相逢喜見新家宅凶災已過福神來莫慮家貧不發財此去管教人畜旺秋冬加倍百和諧婚姻重整羅衣越樣新汝思堪作自家人豈知乆後人心别只恐菱花再染塵失物橫禍飛來要破財如今休把衆人猜有踪終是難全得損折歲見可免灾官事自古饒人不是癡事須有理也須遲公廳自有真明鏡急速難分黑白時行人每遇音書未見眞空勞宻意禱天神要知去客平安事直待龍蛇到始明占病天譴凡人怎得知偶遭磨障費支持如今急早求禳保莫待臨時悔後遲解曰占家宅人口有小灾不妨失物可尋自身更改吉行人未至有信病者保禳求財遂意官事宜和求官必達婚姻再合六甲生男田蠶大熟六畜興旺玄天上帝感應靈籤第四十九籤下下羣鴉集噪聖意群鴉集噪未爲竒防愼隂人口舌欺退後之時方可免不然事緒主憂疑謀望休望羊羔美酒斟魚書鴈信兩沉沉鵲巢已被烏鴉占萬計于謀枉費心家宅口舌無端驀地來只因家宅有疑猜歸來急早求神福免教人口受天災婚姻休信傍人說得狂蓮花那比菊花香好生回步重開眼莫把烏鴉作鳳凰失物自己當時不小心如今失却便難尋休教惹得傍人鬧受辱遭殃豈可禁官事喧嘩閑事閙烘烘久後憂疑主見凶來到公廳分曲直一場驚險遍虛空行人終籤不利卜行人客路忙忙未轉身中道有憂灾禍擾早求洪福叩龍神占病灾病纏綿未得全虔誠求福吿神天操心不改遭魔障若得痊時也損錢解曰占家宅隂人小口有災自身有口舌失物不見病者不安宜作福行人未至求官未達求財未遂官事虛驚婚姻不成六甲生女六畜田蠶有損失大明萬曆三十五年歲次丁未上元吉旦正一嗣教凝誠志道闡玄弘教大真人掌天下道教事張國祥奉㫖校梓
