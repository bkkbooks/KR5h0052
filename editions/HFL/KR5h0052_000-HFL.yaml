front:
  text: 玄天上帝百字聖號冠五混元六天傳法教主脩真悟道濟度羣迷普爲衆生消除災障八十二化三教祖師大慈大悲救苦救難三元都總管九天遊奕使左天罡北極右垣大將軍鎮天助順真武靈應福德衍慶仁慈正烈恊運真君治世福神玉虛師相玄天上帝金闕化身蕩魔天尊
  hash: sha256:c76352772013ebd84debc99f3ee5bbbec5d9a56607fd314a829477d5e469af7d
