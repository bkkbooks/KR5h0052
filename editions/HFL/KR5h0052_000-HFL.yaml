body:
  text: 仁宗皇帝御讚鎮天真武長生福神萬物之祖盛德可委精貫玄天靈光有煒興益之宗保合大同香火瞻敬五福攸從祈籤祝文凡欲祈籤必預誠心潔身清晨神爽之時恭詣聖前焚香祝告曰天蓬大元帥天猷副元帥翊聖保德真君真武靈應大帝北天大道四十九位靈應天尊左右侍從官軍殿庭香火應感真靈向伸啓吿俯垂鑒聽某郷貫某䖏居住某人今爲某事祈求聖籤伏望明彰報應指示愚迷所祈所願大賜顯靈下情無任虔禱之至舉籤念曰天地神祗萬物皆知吾今下課善惡扶持凶應凶兆吉應吉時判斷生死决定無疑玄天上帝聖降日正月初七日二月初八日三月初三日聖旦初九日四月初四日五月初五日六月初七日七月初七日八月十三日九月初九日南山嚴宫五龍捧聖白日飛昇十月二十日十一月初七日十二月二十七日閏月相同玄天上帝感應靈籤第一籤大吉飛龍變化聖意飛龍變化喜逢時此日昇騰果遂期謀望求財多吉慶求官進位更無疑謀望沖霄志氣滿心胷君子應非乆困窮此行當際風雲會萬人頭上逞英雄家宅三陽交泰轉鴻鈞瑞氣迎門萬事新歲稔時豊財禄旺又添人口喜相親婚姻世間大禮是婚姻天配如何悟世人人若自知天理合何須着意問天神失物偶失資財莫怨天要知踪跡在南邊過時終有傳音信莫把平人作盜寃官事未發文書不用嗔公廳雖直事難伸不如散却心頭火免得將錢送别人行人卦直飛龍莫問親千山萬水幾艱辛直交明月團圓處西出陽關見故人占病焚香禱告意精專惟在君心作福田壽筭天曹曾注定何勞私下保安痊解曰占家宅平安病者立痊六甲生男行人立至官有理失物可尋婚姻可成出行吉利求官必達求財大遂田蠶大熟六畜興旺百事大吉玄天上帝感應靈籤第二籤中下虎出大林聖意虎出大林須動衆衆人見了却憂疑雖然未必傷人命亦主虛驚事可知謀望不平天理强支持妄作從來是禍基君子安貧終有道莫教失計被人欺家宅乆淹陋室欲更新爭奈伊家少福祙不憚虛驚憂怪夢更防小口及隂人婚姻乍時相見好容儀誰料中間一半非不是婚姻休作對何如撒手且回歸失物只爲當初不小心資財已失復何尋直教月盡寅申日纔有傍人說信音官事只好安居守運時莫經官府受鞭笞勸君休管人閑事惹得愁來悔後遲行人鴈查魚沉信息稀空勞望斷白雲迷相逢若遇寅辰日鵲噪簷前人馬歸占病鬧中得病靜中安莫作尋常一例看有願在心宜早賽免教積熱變脾寒解曰占身不宜出入失物難尋病者作福行人有信未至求財遲小口有灾六甲難產官事和勸求官未達婚姻難合六畜田蠶半熟玄天上帝感應靈籤第三籤大吉否極泰來聖意否極從今喜泰來龍泉磨拂舊塵埃莫信守己無他望閉户深居也獲財謀望幾年踪跡在江湖名利纔成出困途此日相逢官貴力好看春色滿皇都家宅莫憂家宅乆淹連天理於人豈有偏但肯從前更改過管教財穀勝常年婚姻有緣造物自安排休嘆無緣事不諧此際好聽琴瑟韻莫教夜雨滴空階失物幾年沙裏去淘金失却纔知枉費心目下欲尋難得見直逢日後有知音官事偶遭横事迫軀身寃枉如何訴得伸自有神明空裏祐不教善者作囚人行人歷涉江河幾萬重家郷回首白雲籠從來也有隂功護人在春風和氣中占病剛强狼戾惹兇災譴責肌膚瘦似柴若合道心從革過枯枝花葉一時開解曰占家宅人口大利病宜作福官事有理求財遂意六甲生男求官必達行人即至六畜興旺田蠶大熟身體大吉婚姻可成玄天上帝感應靈籤第四籤中下勞心費力聖意勞心費力欲成功待得花開一陣風須藉東君輕借力望中别有一枝紅謀望用盡機謀事不成如今休要問前程直待金鳥到坤震自然榮顯利名興家宅無由閑事費支持枉用貪心不見機畜產損傷猶小失更防人口有驚疑婚姻婚姻到日不須尋何必區區枉用心有意種花栽不活等閑插柳却成林失物喫辛受苦趲資財誰想今朝灰受災得失富貧皆由命如今不必亂疑猜官事自古剛强解悟身誰知有理反遭嗔如今未必官刑責何不私和做好人行人去時指望採黄金回首家郷路轉深今日早知人事别當初何似莫貪心占病但知動作是眞竒不想貪心惹禍基空使七情傷本體早求善力保無疑解曰占家宅人口有災心失脫求財未遂失物不見即宜急尋行人未至病者重作福求官未達六甲有驚田蠶半熟六畜宜保婚事不成官事和玄天上帝感應靈籤第五籤大吉行船風順聖意行船風順去無疑利涉江津正遇時萬里長程知可到所謀遂意事如期謀望欲求動止莫懷疑名利求尋莫待遲但得便中須速去休教蹉過運和時家宅家門興旺福神多人口無災百事和春夏累沾些小悔秋冬喜氣自然多婚姻百歲婚姻一日成今朝何事苦調停兩邊相許無餘事便好承歡通娉婷失物昨日扁舟過洞庭知君心下不安寧相應失却凡間物終有踪由莫用驚官事理直何須問上眞縱經官府不遭嗔雖然目下多驚恐保汝平安百事伸行人歸期限促恨悠悠爭柰淹留事未週若得福神添力祐輕帆風送岸頭舟占病誰覺災來疾似風盧醫扁鵲枉施功何知一願酧天地再與添籌作老翁解曰占家宅人口大吉求財有喜失物可尋病者漸退行人將至官事有理婚姻可成田蠶六畜興旺占身作福吉求官必達六甲生男百事大吉玄天上帝感應靈籤第六籤下下鴛鴦分飛聖意鴛鴦阻隔兩分飛謀望求財未得時守舊却宜休改革如今進退尚遲疑謀望名利從來不易求忙忙世事水中鷗天公不欲人貪柘枉使浮雲空白頭家宅指望今年百事昌誰知因小惹災殃如今若得人財好重吿家神炷願香婚姻不將年命合相同勉强求成豈利通縱若有緣成一處終須離别各西東失物失却凡財問聖真汝今莫把衆人嗔天曹料剩分毫定衣食隨求不害身官事休聽人唆入縣衙兩邊徒爾結寃家不如撒手平和去免得階前叫老爹行人去時多有弟和兄豈料中途失伴群阻滯未來終久到何須每日倚柴門占病妻占夫兮夫占妻終朝必定守孤恓父兄伯叔占男子患難雖沉尚可醫解曰占家宅有口舌生災失物不見官事宜和求財未遂求官未達病祭家神行人求至六甲生女田蠶半熟六畜保吉占身遲滯婚姻不成玄天上帝感應靈籤第七籤中上枯木逢春聖意枯木逢春色欲華頓然枝盛長萌芽時人莫作爲柴砍直待春深又吐華謀望乆在山中待好音無人拔採說知情如今借得東風力葉茂花繁覆地隂家宅淹滯消除正可誇福星一點照君家從今莫聽傍人說樹正何愁日影斜婚姻幾年九坐没人招今日枯枝長嫩條自是婚姻千里合無縁對面路迢遥失物分明失物在東方不解追尋室裏忙若還更遲三五日他人落得嘴頭光官事新事傷人舊事成勸君休要逞高能平心自有憲臺上此地從來不可登行人音書許送到君家爭奈人情事未諧直待三陽回馬後忽然衣錦到門階占病無災不肯念彌陀有病纔思舊願多若肯盡心從改過不交善者見閻羅解曰占家宅小口有災病者作福占身忌小人侵筭失物急尋求財未遂行人有信至求官未達田蠶半熟六甲生男六畜保吉婚姻可成玄天上帝感應靈籤第八籤下下漁舟上灘聖意因見漁舟上逆灘漁舟泊此且盤桓前灘過了渾無事更有後灘過更難謀望命裏無時不必求何須日夜泛魚舟紅鱗祗在秋波内用盡心機不上鈎家宅不能安分每貪圖惹得家神禍事多春夏憂愁人口病秋冬又忌損田禾婚姻傍人只說兩相當難測胷懷抱虎狼面好怎知心不好不知獨枕卧藤床失物皆因爲小失驢牛觸在心頭整日憂人眼不如天眼見分明教汝莫貪求官事得和闌處且和闌到處人心有惡奸莫信酒中胡說易豈知臺上對詞難行人一心常卦兩頭憂路阻關心不自由惆悵幾多寃恨事更無消息到楊州占病只因小事惱心懷惹得憂疑怪病來急向靜中求福善莫教加譴墮塵埃解曰占家宅人口有灾自身防口舌病作福失物不見求財未遂行人未至官事失理求官未達田蠶半熟六甲難產有虛驚六畜宜更動婚姻難成玄天上帝感應靈籤第九籤中平春蘭秋菊聖意蘭芳春景真堪愛菊吐青香色又佳乾坤各自爲情意不解東風次第開謀望昔曾許汝到春來豈料營爲意不諧且待菊梅開綻月依然名利兩全哉家宅指望家和萬事成年來憂悶幾曾伸因和不把家神敬門户無人有嚮聲婚姻婚若成時待月圓不須心下意懸懸雖然好段姻縁事爭奈他人尚未堅失物自失如何怨老天神公豈肯爲財憐伊君要聽真消息不在明年在後年官事戒伊不用苦貪嗔恐有文詞到訟聽凡事抽身歸去好閉門靜坐作賢人行人乆去雖然音信稀汝今何用意躊蹰菊蘭自有開花日各自根苗等待時占病此處懨懨怨滿懷未逢良藥事難諧平安等到三更後禍去從交福降來解曰占家宅防小口有災隂人有災宜作福失物難尋病者作福求財半遂行人有信官事留連未達六甲未産六畜旺相婚姻可合遲玄天上帝感應靈籤第十籤下下遊蜂作蜜聖意不論平地與山尖無限風光緫被占採得百花成蜜後與誰辛苦與誰甜謀望托人去幹心中事早早回頭歸故鄉口好怎知心不好癡心且去受災殃家宅令歲田蠶半吉祥夏秋又忌損牛羊冬深人口宜禳保更忌凶人夜入墻婚姻野草閑花莫戀迷一朝樂極便生悲收心且待婚姻事莫惹傍人說是非失物失去資財莫怨天誰交賢者只貪眠情知已入他人手不在蘆花淺水邊官事世間難戒是貪嗔因笑螳螂不見機只恐鳴蟬遭汝捕不知黄雀後頭隨行人艱難經涉萬重山心事忙忙意未還又恐路途人毒害幾多凶險在其間占病惡病臨身没奈何看看沉重見閻羅如今若要凶星退速請高僧理刹那解曰占家宅防有災占身平安失物不見防口舌求財耗散行人未至病者主重宜作福官事未了求官未達六甲生女婚姻不成有口舌田蠶半熟玄天上帝感應靈籤第十一籤大吉囚人出獄聖意囚人出獄爭訟了却買甜瓜上酒樓遇見故人同暢飮酒錢還了又相酬謀望埋沉踪跡未亨通今日承恩謝上穹改過前非行大道自然財禄儘雍容家宅馬旺人興百事宜田蠶十倍在秋期但防隂小生灾疾見喜無憂不可欺婚姻前世因縁會今生莫爲資財起愛憎若有貴人提拔處好攀月桂上雲層失物莫賴平人暗裏賫分明落在巿橋西如今有靠神靈祐失物還須不得齊官事從來懼法伯官方事到頭來險幾場自有高人親眼盻不須惆悵慮心腸行人幾年相别到門閭今日他郷遇故知歸意急如江上浪只爭來早與來遲占病幾年纔脫是非門豈料天灾又染身若更不求神力祐留連日久困塵埃解曰占家宅添人口占身無事失物可尋病者服藥求財大獲行人立至官事有理婚姻可成求官得位六甲生男遲田蠶大熟六畜興旺凡事大吉玄天上帝感應靈籤第十二籤下下風捲楊花聖意楊花風捲無消息却似襄王一夢中夜靜月眀風細䖏空飄零落惹芳叢謀望不依時運强求財心地高平汝自裁若要妄爲非禮事不招禍至惹天灾家宅路險身衰暮夜歸謹防目下鬧中非家中小口招災禍六畜田蠶今歲虧婚姻未有姻緣莫主張兩邊年命少相當媒人本是瞞人漢謀得成來不久常失物原來不是自家財何用叨叨着意猜不想破財又折本緫然尋得也招灾官事橫事無憂驀地來心中愁悶幾時開如今不惹和爲貴免得將錢到憲臺行人魚沉鴈杳去無踪困旅窮途阻不通萬里故郷歸未得陽關回首白雲濃占病夢入幽冥路已賒投神空自惹咨嗟落花有意隨流水流水無情戀落花解曰占家宅不利隂人